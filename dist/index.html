<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cross Stitch - Welcome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      background-color: #FFFFFF;
      color: #000000;
      overflow: hidden;
    }
    
    .container {
      width: 100%;
      min-height: 100vh;
      padding: 8px 20px 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    
    .button {
      width: 100%;
      max-width: 355px;
      height: 56px;
      background-color: #FED11F;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      color: #000000;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 16px;
      margin-bottom: 20px;
    }
    
    .button:active {
      opacity: 0.8;
      transform: scale(0.98);
    }
    
    .button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .title {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .subtitle {
      font-size: 16px;
      color: #888888;
      text-align: center;
    }
    
    .text {
      font-size: 14px;
      text-align: center;
      margin-bottom: 8px;
    }
    
    .text-white {
      color: #FFFFFF;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 335px;
      margin-bottom: 24px;
      padding-top: 8px;
    }
    
    .back-button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 8px;
    }
    
    .skip-button {
      background: none;
      border: none;
      font-size: 14px;
      color: #888888;
      cursor: pointer;
      padding: 8px;
    }
    
    .progress-bar {
      width: 100px;
      height: 4px;
      background-color: #E5E5E5;
      border-radius: 2px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background-color: #FED11F;
      transition: width 0.3s ease;
    }
    
    .option-list {
      width: 100%;
      max-width: 335px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .option {
      display: flex;
      align-items: center;
      padding: 16px;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .option:active {
      background-color: #F5F5F5;
    }
    
    .option.selected {
      border-color: #FED11F;
      background-color: #FFF9E6;
    }
    
    .option-icon {
      font-size: 24px;
      margin-right: 12px;
    }
    
    .option-text {
      flex: 1;
      font-size: 16px;
    }
    
    .checkbox {
      width: 20px;
      height: 20px;
      border: 1px solid #E5E5E5;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .checkbox.checked {
      background-color: #FED11F;
      border-color: #FED11F;
      color: #FFFFFF;
    }
    
    .grid-container {
      width: 100%;
      max-width: 335px;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    
    .grid-item {
      aspect-ratio: 1;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    
    .grid-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.3);
      z-index: 1;
    }
    
    .grid-item span {
      position: relative;
      z-index: 2;
    }
    
    .grid-item:active {
      transform: scale(0.98);
    }
    
    .grid-item.selected {
      border: 3px solid #FED11F;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 200px;
    }
    
    .loading-circle {
      width: 80px;
      height: 80px;
      border: 4px solid #E5E5E5;
      border-top: 4px solid #FED11F;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    
    .loading-check {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: #FED11F;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      color: #FFFFFF;
      margin-bottom: 16px;
      animation: scaleIn 0.5s ease;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes scaleIn {
      0% { transform: scale(0); }
      100% { transform: scale(1); }
    }
    
    .emoji-container {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
    }
    
    .emoji {
      position: absolute;
      font-size: 24px;
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); opacity: 0; }
      50% { transform: translateY(-20px); opacity: 1; }
    }
    
    @keyframes fadeInUp {
      0% { transform: translateY(30px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes fadeOutUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-30px); opacity: 0; }
    }
    
    .subscription-container {
      width: 100%;
      max-width: 335px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .banner {
      width: 100%;
      height: 160px;
      border-radius: 12px;
      object-fit: cover;
    }
    
    .plan-container {
      width: 100%;
      border: 1px solid #E5E5E5;
      border-radius: 12px;
      overflow: hidden;
    }
    
    .plan-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #E5E5E5;
    }
    
    .plan-item:last-child {
      border-bottom: none;
    }
    
    .plan-name {
      font-size: 16px;
      font-weight: 600;
    }
    
    .plan-price {
      font-size: 16px;
      font-weight: 700;
    }
    
    .restore-link {
      text-align: center;
      font-size: 14px;
      color: #888888;
      text-decoration: underline;
      cursor: pointer;
    }
    
    .terms-text {
      font-size: 12px;
      color: #888888;
      text-align: center;
      line-height: 1.4;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-DvkUZ3iz.js"></script>
</head>

  <div id="app"></div>
</body>
</html>
